spring.application.name=backend
server.port=8080

# Database Configuration
spring.datasource.url=${DATASOURCE_URL}
spring.datasource.username=${DATASOURCE_USERNAME}
spring.datasource.password=${DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=${SHOW_SQL:false}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.show_sql=${SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=${SHOW_SQL:false}
spring.jpa.open-in-view=false

# JWT Configuration
JWT_SECRET=${JWT_SECRET:preplcSecretKeyForJWTTokenGenerationAndValidation2024ThisIsAVeryLongSecretKey}
JWT_EXPIRATION=${JWT_EXPIRATION:86400000}

# CORS
frontend.url=${FRONTEND_URL}

# Actuator (health check for Docker)
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

